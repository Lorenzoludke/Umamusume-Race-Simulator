<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/saldo.css">
    <title>Saldo</title>
</head>
<body>
    <div class="saldo-container">
        <div class="saldo-box">
            <h1>Saldo: <span id="saldo"></span> moedas</h1>
        </div>
    </div>

    <div>
        <h2 class="subtitle">Adicionar moedas</h2>
    </div>

    <div class="addCoins">
        <p data-value="5">5 moedas</p>
        <p data-value="10">10 moedas</p>
        <p data-value="20">20 moedas</p>
        <p data-value="50">50 moedas</p>
        <p data-value="100">100 moedas</p>
    </div>

    <div>
        <button class="indexButton" onclick="goBackIndex()">Voltar</button>
    </div>

    <script src="../js/geral.js"></script>
    <script src="../js/saldo.js"></script>
</body>
</html>
